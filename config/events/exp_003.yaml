# EXP-003: Volatility Compression
# Spec §18 — ATR percentile below 25, price less than 5% below 60d high

experiment:
  id: exp_003
  family: compression
  description: "Volatility compression: ATR percentile < 25, price < 5% below 60d high"
  hypothesis: "Periods of low volatility with price near highs precede directional expansion."

event:
  conditions:
    # Audit 4: rango real de atr_percentile_60d es [0.0, 1.0], no porcentaje
    - feature: atr_percentile_60d
      operator: "<"
      value: 0.25

    # Audit 4: distance_to_high_60d <= 0; "within 5% of high" es >= -0.05
    - feature: distance_to_high_60d
      operator: ">="
      value: -0.05

  cooldown_sessions: 20
  forward_horizons: [1, 3, 5, 10, 20]

validation:
  discovery_pct: 60
  validation_pct: 20
  holdout_pct: 20

research:
  primary_horizon: 10
  secondary_horizons: [1, 3, 5, 20]
