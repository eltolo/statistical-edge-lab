# EXP-002: Pullback With Volume
# Spec §18 — All EXP-001 conditions + volume > 1.5x 20d average

experiment:
  id: exp_002
  family: pullback
  description: "Moderate pullback with high volume: EXP-001 conditions + volume > 1.5x 20d average"
  hypothesis: "A pullback accompanied by above-average volume produces stronger forward returns than a low-volume pullback."

event:
  conditions:
    close_above_sma_200:
      operator: "=="
      value: 1.0
    return_60d:
      operator: ">"
      value: 0.10
    return_3d:
      operator: "<"
      value: -0.03
    volume_ratio_20d:
      operator: ">"
      value: 1.5

  cooldown_days: 10
  forward_horizons: [1, 3, 5, 10, 20]

validation:
  discovery_pct: 60
  validation_pct: 20
  holdout_pct: 20
