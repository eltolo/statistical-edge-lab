# EXP-002: Pullback With Volume
# Spec §18 — All EXP-001 conditions + volume > 1.5x 20d average

experiment:
  id: exp_002
  family: pullback
  description: "Moderate pullback with high volume: EXP-001 conditions + volume > 1.5x 20d average"
  hypothesis: "A pullback accompanied by above-average volume produces stronger forward returns than a low-volume pullback."

event:
  # Audit P0 #6: List format for bounded conditions.
  # EXP-001 conditions + volume > 1.5x 20d average
  conditions:
    - feature: close_above_sma_200
      operator: "=="
      value: 1.0

    - feature: return_60d
      operator: ">"
      value: 0.10

    # Bounded: -7% <= return_3d < -3%
    - feature: return_3d
      operator: "<"
      value: -0.03

    - feature: return_3d
      operator: ">="
      value: -0.07

    - feature: volume_ratio_20d
      operator: ">"
      value: 1.5

  # Audit P0 #11: Session-based cooldown (max forward horizon = 20)
  cooldown_sessions: 20
  forward_horizons: [1, 3, 5, 10, 20]

validation:
  discovery_pct: 60
  validation_pct: 20
  holdout_pct: 20
