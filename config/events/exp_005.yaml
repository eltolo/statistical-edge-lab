# EXP-005: Extreme Decline
# Spec §18 — 3d return < -2 std dev, market regime not BEAR

experiment:
  id: exp_005
  family: reversal
  description: "Extreme decline: 3d return < -2 std dev, market not in bear regime"
  hypothesis: "An abnormal short-term decline produces a measurable mean-reversion effect when the broader market is not bearish."

event:
  conditions:
    - feature: return_3d_zscore
      operator: "<"
      value: -2.0
    - feature: trend_regime
      operator: "!="
      value: "BEAR"

  cooldown_sessions: 20
  forward_horizons: [1, 3, 5, 10, 20]

validation:
  discovery_pct: 60
  validation_pct: 20
  holdout_pct: 20

research:
  primary_horizon: 10
  secondary_horizons: [1, 3, 5, 20]
