# EXP-004: Breakout From Compression
# EXP-003 conditions + close above 20d high + volume > 1.5x

experiment:
  id: exp_004
  family: compression
  description: "Breakout from volatility compression: EXP-003 + close above 20d high + volume > 1.5x"
  hypothesis: "A breakout from low-volatility consolidation produces sustained directional movement."

event:
  conditions:
    # Audit 4: rango real de atr_percentile_60d es [0.0, 1.0], no porcentaje
    - feature: atr_percentile_60d
      operator: "<"
      value: 0.25

    # Audit 4: distance_to_high_60d <= 0; "within 5% of high" es >= -0.05
    - feature: distance_to_high_60d
      operator: ">="
      value: -0.05
    - feature: close_breaks_high_20d
      operator: "=="
      value: 1.0
    - feature: volume_ratio_20d
      operator: ">"
      value: 1.5

  cooldown_sessions: 20
  forward_horizons: [1, 3, 5, 10, 20]

validation:
  discovery_pct: 60
  validation_pct: 20
  holdout_pct: 20

research:
  primary_horizon: 10
  secondary_horizons: [1, 3, 5, 20]
